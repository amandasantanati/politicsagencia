# Deploy com build step: Tailwind CSS + Terser + WebP
name: Build e Deploy para GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build CSS e JS
        run: npm run build

      - name: Instalar webp e converter imagens
        run: |
          sudo apt-get install -y webp
          find assets/images -type f \( -name "*.png" -o -name "*.jpg" \) | while read f; do
            base="${f%.*}"
            cwebp -q 82 "$f" -o "${base}.webp"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
